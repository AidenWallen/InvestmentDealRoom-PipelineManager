<form (ngSubmit)="onSubmitDeal()" #dealForm="ngForm" class="deal-form">

  <div>
    <label>Name</label>
    <input
      type="text"
      name="dealName"
      [(ngModel)]="formDeal.dealName"
      required
    />
  </div>

  <div>
    <label>Type</label>
    <select
      name="dealType"
      [(ngModel)]="formDeal.dealType"
      required
    >
      @for (t of dealTypes; track t) {
        <option [value]="t">{{ t }}</option>
      }
    </select>
  </div>

  <div>
    <label>Target Company</label>
    <input
      type="text"
      name="targetCompany"
      [(ngModel)]="formDeal.targetCompany"
      required
    />
  </div>

  <div>
    <label>Estimated Value</label>
    <input
      type="number"
      name="estimatedValue"
      [(ngModel)]="formDeal.estimatedValue"
      min="0"
    />
  </div>

  <div>
    <label>Currency</label>
    <select
      name="currency"
      [(ngModel)]="formDeal.currency"
      required
    >
      @for (c of currencyValues; track c) {
        <option [value]="c">{{ c }}</option>
      }
    </select>
  </div>

  <div>
    <label>Pipeline Stage</label>
    <select
      name="pipelineStage"
      [(ngModel)]="formDeal.pipelineStage"
      [disabled]="!!formDeal.id"
      required
      [ngClass]="{
        'bg-gray-200 text-gray-500 cursor-not-allowed': !!formDeal.id
      }"
    >
      @for (p of pipelineStages; track p) {
        <option [value]="p">{{ p }}</option>
      }
    </select>
  </div>

  <button type="submit" [disabled]="!dealForm.form.valid">
    {{ formDeal.id ? 'Update Deal' : 'Create Deal' }}
  </button>

</form>
