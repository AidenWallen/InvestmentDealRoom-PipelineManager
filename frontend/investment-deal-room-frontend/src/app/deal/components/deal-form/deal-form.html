<form (ngSubmit)="submit()" #dealForm="ngForm" class="deal-form">

  <div>
    <label>Name</label>
    <input
      type="text"
      name="name"
      [(ngModel)]="deal.name"
      required
    />
  </div>

  <div>
    <label>Type</label>
    <select
      name="type"
      [(ngModel)]="deal.type"
      required
    >
    @for (t of dealTypes; track t) {
        <option [value]="t">{{ t }}</option>
    }
    </select>
  </div>

  <div>
    <label>Target Company</label>
    <input
      type="text"
      name="targetCompany"
      [(ngModel)]="deal.targetCompany"
      required
    />
  </div>

  <div>
    <label>Estimated Value</label>
    <input
      type="number"
      name="estimatedValue"
      [(ngModel)]="deal.estimatedValue"
      min="0"
    />
  </div>

  <div>
    <label>Currency</label>
    <select
      name="currency"
      [(ngModel)]="deal.currency"
      required
    >
    @for (c of currencyValues; track c) {
        <option [value]="c">{{ c }}</option>
    }
    </select>
  </div>

  <div>
    <label>Pipeline Stage</label>
    <select
      name="pipelineStage"
      [(ngModel)]="deal.pipelineStage"
      required
    >
    @for (p of pipelineStages; track p) {
        <option [value]="p">{{ p }}</option>
    }
    </select>
  </div>

  <button type="submit" [disabled]="!dealForm.form.valid">
    Create Deal
  </button>

</form>
